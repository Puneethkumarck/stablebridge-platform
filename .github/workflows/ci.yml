name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      - name: Spotless check
        run: ./gradlew spotlessCheck --build-cache

      - name: Unit tests
        run: ./gradlew :merchant-onboarding:merchant-onboarding:test --build-cache

      - name: Integration tests
        run: ./gradlew :merchant-onboarding:merchant-onboarding:integrationTest --build-cache

      - name: Business tests
        run: ./gradlew :merchant-onboarding:merchant-onboarding:businessTest --build-cache
