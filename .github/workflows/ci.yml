name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Unit tests
        run: ./gradlew :merchant-onboarding:merchant-onboarding:test

      - name: Integration tests
        run: ./gradlew :merchant-onboarding:merchant-onboarding:integrationTest

      - name: Business tests
        run: ./gradlew :merchant-onboarding:merchant-onboarding:businessTest
