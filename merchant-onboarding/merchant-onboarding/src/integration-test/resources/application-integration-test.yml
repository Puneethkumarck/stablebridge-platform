spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  cloud:
    stream:
      bindings:
        merchant-activated-out-0:
          destination: merchant.activated
        merchant-applied-out-0:
          destination: merchant.applied
        merchant-suspended-out-0:
          destination: merchant.suspended
        merchant-closed-out-0:
          destination: merchant.closed
        merchant-kyb-passed-out-0:
          destination: merchant.kyb.passed
        merchant-kyb-failed-out-0:
          destination: merchant.kyb.failed
        merchant-corridor-approved-out-0:
          destination: merchant.corridor.approved

  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.RootNamespaceAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.NonRootNamespaceAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.ServiceStubsAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.TestServerAutoConfiguration

outbox:
  relay:
    fixed-delay-ms: 50

server:
  port: 0

logging:
  level:
    com.stablecoin.payments: DEBUG
    org.springframework.test: INFO
    org.testcontainers: INFO
